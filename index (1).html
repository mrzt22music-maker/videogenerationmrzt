<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GenTube – AI Video Generator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER / TOP NAV
  ═══════════════════════════════════════════ -->
  <header class="yt-header">
    <div class="header-left">
      <button class="icon-btn hamburger-btn" id="sidebarToggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" class="icon"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <a href="#" class="logo-link">
        <svg class="logo-icon" viewBox="0 0 90 20" fill="none">
          <rect width="28" height="20" rx="5" fill="#FF0000"/>
          <polygon points="12,5 21,10 12,15" fill="white"/>
          <text x="33" y="15" fill="white" font-family="Roboto" font-weight="700" font-size="14" letter-spacing="-0.5">GenTube</text>
        </svg>
      </a>
    </div>

    <div class="header-center">
      <div class="search-bar-wrapper">
        <input
          type="text"
          id="promptInput"
          class="search-input"
          placeholder="Describe the video you want to generate…"
          autocomplete="off"
        />
        <button class="search-btn" id="generateBtn" aria-label="Generate">
          <svg viewBox="0 0 24 24" class="icon"><path d="M8 5v14l11-7z"/></svg>
          <span>Generate</span>
        </button>
      </div>
      <button class="icon-btn mic-btn" aria-label="Voice input">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
    </div>

    <div class="header-right">
      <button class="icon-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <div class="avatar" aria-label="Profile">AI</div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       BODY WRAPPER
  ═══════════════════════════════════════════ -->
  <div class="body-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Home</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
          <span>Profile</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          <span>History</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
          <span>Library</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
          <span>Subscriptions</span>
        </a>

        <div class="sidebar-divider"></div>

        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z"/></svg>
          <span>Trending</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          <span>Music</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M21 6.5l-4-4-8.5 8.5-2 4 4-2L21 6.5zm-18 9v4h4l-4-4z"/></svg>
          <span>Art & Design</span>
        </a>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section-title">SETTINGS</div>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          <span>Settings</span>
        </a>
        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
          <span>Help</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">

      <!-- ── HOMEPAGE VIEW ── -->
      <section class="homepage-view" id="homepageView">
        <div class="chips-bar">
          <button class="chip active">All</button>
          <button class="chip">Cinematic</button>
          <button class="chip">Sci-Fi</button>
          <button class="chip">Nature</button>
          <button class="chip">Abstract</button>
          <button class="chip">Architecture</button>
          <button class="chip">Fashion</button>
          <button class="chip">Sports</button>
          <button class="chip">Music</button>
          <button class="chip">Food</button>
        </div>

        <div class="video-grid" id="videoGrid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- ── WATCH PAGE VIEW ── -->
      <section class="watch-view hidden" id="watchView">
        <div class="watch-layout">

          <!-- Primary / Video Column -->
          <div class="watch-primary">

            <!-- Video Player -->
            <div class="video-player-container" id="videoPlayerContainer">
              <!-- Skeleton loader shown while generating -->
              <div class="video-skeleton" id="videoSkeleton">
                <div class="skeleton-shimmer"></div>
                <div class="skeleton-bars">
                  <div class="skel-bar wide"></div>
                  <div class="skel-bar medium"></div>
                  <div class="skel-bar short"></div>
                </div>
              </div>
              <!-- Actual video / result area -->
              <div class="video-result hidden" id="videoResult">
                <div class="player-box">
                  <video id="generatedVideo" controls autoplay loop>
                    Your browser does not support the video tag.
                  </video>
                  <div class="player-overlay hidden" id="playerOverlay">
                    <img id="generatedGif" alt="Generated video" />
                  </div>
                  <!-- Error State -->
                  <div class="player-error hidden" id="playerError">
                    <svg viewBox="0 0 24 24" class="error-icon"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    <p id="errorMessage">Something went wrong.</p>
                    <button class="retry-btn" id="retryBtn">Try Again</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Video Info -->
            <div class="video-info hidden" id="videoInfo">
              <h1 class="video-title" id="videoTitle">Untitled Generation</h1>
              <div class="video-meta-row">
                <div class="view-count"><span id="viewCount">0</span> views · <span id="timeAgo">just now</span></div>
                <div class="action-btns">
                  <button class="action-btn like-btn">
                    <svg viewBox="0 0 24 24" class="icon"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    <span>Like</span>
                  </button>
                  <button class="action-btn dislike-btn">
                    <svg viewBox="0 0 24 24" class="icon"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
                    <span>Dislike</span>
                  </button>
                  <button class="action-btn share-btn">
                    <svg viewBox="0 0 24 24" class="icon"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                    <span>Share</span>
                  </button>
                  <button class="action-btn download-btn" id="downloadBtn">
                    <svg viewBox="0 0 24 24" class="icon"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    <span>Download</span>
                  </button>
                </div>
              </div>
              <div class="video-divider"></div>
              <div class="channel-row">
                <div class="channel-avatar">AI</div>
                <div class="channel-info">
                  <div class="channel-name">GenTube AI Studio</div>
                  <div class="channel-subs">1.2M subscribers</div>
                </div>
                <button class="subscribe-btn">Subscribe</button>
              </div>
              <div class="video-description" id="videoDescription">
                <p id="descriptionText"></p>
              </div>
            </div>
          </div>

          <!-- Secondary / Sidebar Recommendations -->
          <div class="watch-secondary">
            <div class="rec-title">Up Next</div>
            <div class="recommendations" id="recommendations">
              <!-- Populated by JS -->
            </div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
